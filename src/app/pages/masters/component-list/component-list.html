<div class="card h-full">
    <h2>Components</h2>
    <div class="border border-(--surface-border) rounded-lg overflow-hidden mt-2">
        <p-table [value]="components" [rowHover]="true" [tableStyle]="{ 'min-width': 'max-content' }">
            <ng-template #header>
                <tr>
                    <th>SL No</th>
                    <th>Component Name</th>
                </tr>
            </ng-template>
            <ng-template #body let-component let-i="rowIndex">
                <tr>
                    <td>{{ i + 1 }}</td>
                    <td>{{ component.componentName }}</td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
