<div class="card h-full">
    <div class="shadow-sm rounded-lg p-6">
        <div class="flex items-center justify-between">
            <h2>Production Plan</h2>
            <div class="flex justify-end gap-2 mb-2">
                <button pButton pRipple type="button">
                    <i pButtonIcon>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                            <rect width="24" height="24" fill="none" />
                            <path fill="currentColor" d="M19 11h-6V5a1 1 0 0 0-2 0v6H5a1 1 0 0 0 0 2h6v6a1 1 0 0 0 2 0v-6h6a1 1 0 0 0 0-2" />
                        </svg>
                    </i>
                    <span pButtonLabel>Create Plan</span>
                </button>
            </div>
        </div>
        <p-panel [toggleable]="true">
            <ng-template #header>
                <div class="flex items-center justify-between mt-1 gap-2">
                    <h5>Mar-2026 Plan</h5>
                    <div class="flex justify-end gap-2"> 
                        <p-floatlabel variant="on">
                            <p-datepicker view="month" dateFormat="mm/yy" showIcon iconDisplay="input" inputId="month" appendTo="body"
                                [readonlyInput]="true" styleClass="w-full" placeholder="MM/YYYY" ngSkipHydration />
                            <label for="month">Month</label>
                        </p-floatlabel>
                        <button pButton pRipple text type="button" (click)="addWTGType()">
                            <i pButtonIcon>
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                                    <rect width="24" height="24" fill="none" />
                                    <path fill="currentColor"
                                        d="M19 11h-6V5a1 1 0 0 0-2 0v6H5a1 1 0 0 0 0 2h6v6a1 1 0 0 0 2 0v-6h6a1 1 0 0 0 0-2" />
                                </svg>
                            </i>
                            <span pButtonLabel>Add WTG Type</span>
                        </button>
                    </div>
                </div>
            </ng-template>
            <div class="border border-surface px-4 py-2 rounded-md">
                <form [formGroup]="productionPlanForm">
                    <ng-container formArrayName="wtgList">
                        @for(group of wtgList.controls; track $index; let i = $index){
                            <ng-container [formGroupName]="i">
                                <div class="flex justify-end gap-2 mb-2">
                                    <div class="flex items-center gap-2">
                                        <label for="tower-scope">Tower Scope</label>
                                        <p-toggleswitch formControlName="towerScope" inputId="tower-scope"
                                            (onChange)="check($event)" />
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-2 mb-2"
                                    [ngClass]="{ 'border-b border-dashed border-surface pb-2': i < wtgList.length - 1 }">
                                    @if(group.get('towerScope')?.value === true){
                                        <div class="col-span-1">
                                            <p-floatlabel variant="on">
                                                <p-select [options]="towerTypeList" formControlName="towerType" id="tower-type" styleClass="w-full" appendTo="body" />
                                                <label for="tower-type">Tower Type</label>
                                            </p-floatlabel>
                                        </div>
                                    }
                                    <div class="col-span-1">
                                        <p-floatlabel variant="on">
                                            <p-select [options]="bladeTypeList" formControlName="bladeType" id="blade-type" styleClass="w-full" appendTo="body" />
                                            <label for="blade-type">Blade Type</label>
                                        </p-floatlabel>
                                    </div>
                                    <div class="col-span-1">
                                        <p-floatlabel variant="on">
                                            <input type="text" pInputText formControlName="wtgQty" id="qty" class="w-full" />
                                            <label for="qty">WTG Quantity</label>
                                        </p-floatlabel>
                                    </div>
                                </div>
                            </ng-container>
                        }
                    </ng-container>
                </form>
            </div>
        </p-panel>
        <div class="flex justify-end mt-3">
            <button pButton pRipple>Submit</button>
        </div>
    </div>
</div>
